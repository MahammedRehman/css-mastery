<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="hero.css">
    <title>Simple Hero Section</title>
</head>

<body>
    <div class="container">

        <header>
            <div class="navbar">
                <div class="logo">
                    <img src="/Assets/logo.png" alt="logo">
                    <p>Dots</p>
                </div>
                <div class="nav-links">
                    <a href="#">Home</a>
                    <a href="#">About</a>
                    <a href="#">Services</a>
                    <a href="#">Industry</a>
                    <a href="#">Contact</a>
                </div>
                <button class="nav-cta">Get In Touch</button>
            </div>
        </header>

        <section class="hero">

            <div class="hero-content">
                <p class="title">Finding the rigth talent has never been easy</p>
                <p class="description">From startups to corporation we work closely to identify, evalute, and hire the
                    best professionals for your unnique business needs.</p>
                <div class="hero-cta">
                    <button class="CTA find-talent">Find Talent</button>
                    <button class="CTA learn-more">Learn More</button>
                </div>

                <div class="stats">
                    <div>
                        <h3>540+</h3>
                        <span>Talents Hired</span>
                    </div>
                    <div>
                        <h3>40+</h3>
                        <span>Trusted Clients</span>
                    </div>
                    <div>
                        <h3>95%</h3>
                        <span>Retention Rate</span>
                    </div>
                </div>
            </div>
            <div class="hero-img">
                <img src="/Assets/main-women.png" alt="hero-image">
            </div>
    </div>
    </div>
    </section>
</body>

</html>
