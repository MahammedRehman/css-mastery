<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day - Position</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        /* box-sizing: border-box; */
    }
    .parent{
        border: 3px solid coral;
        border-radius: 12px;
        margin: 24px;
        padding: 12px;
        position: absolute;
    }
    .box{
      height: 121px;
      width: 80vw;
      /* border: 2px solid grey; */
      margin: 12px;
      padding: 3px;
      
    }
    .box1{
        background: aqua;
    }
    .box2{
        background: aquamarine;
        position: absolute;
        top: 72px;
        left: 32px;
        z-index: 2;
    }
    .box3{
        background: antiquewhite;
        position: relative;
        /* top: 12px; */
        right: 44px;
        z-index: 1;
    }
    .box4{
        background: aliceblue;
    }
</style>
<body>
    <div class="parent">
        <div class="box box1"></div>
        <div class="box box2"></div>
        <div class="box box3"></div>
        <div class="box box4"></div>
    </div>
</body>
</html>
